name: Daily Ozone Forecast

on:
  schedule:
    #- cron: "0 10 * * *"   # 6:00 AM Eastern during EDT
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo with Git LFS
        uses: actions/checkout@v5
        with:
          lfs: true
          fetch-depth: 0

      - name: Pull Git LFS files
        run: |
          git lfs install
          git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas==1.5.3 openpyxl joblib==1.2.0 scikit-learn==1.2.2 numpy==1.26.4 scipy==1.10.1 PyGithub

      - name: Run forecast pipeline
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.FORECAST_GITHUB_TOKEN }}
        run: |
          python run_forecast.py
